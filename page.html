<!DOCTYPE html>
<html lang="en">
<head>
    <title>Sign_up Form by Tahrima Sultana</title> <!-- 1. title -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Tahrima Sultana">
    <meta name="description" content="A page made for WWW midterm.It is a sign-up form including...">
    <meta name="keywords" content="signup, basic-info, profile, submit, clear, form">
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">

    <style>
        /* css stuff*/
        body {
            font-family: Arial, sans-serif; /*1. font */
            margin: 0;                     /*2. margin */
            padding: 0;                    /*3. padding */
            background-color: #ad7fad;  /* 4.background */
        }

        header, footer {
            background-color: #eeeeee;      /* 5. background */
            text-align: center;              /* 6. text align */
            padding: 15px;                  
            border: 1px solid #cccccc;     /* 7. border */
        }

        main {
            max-width: 600px;            /* 8. max width */
            margin: 20px auto;              
        }

        .form-group {
            margin-bottom: 15px;        /* 9. margin on bottom */
        }

        .form-group label {
            display: block;              /* 10. bolding */
            font-weight: bold;              
        }

        

    </style>
</head>
<body>
    <header>
        <span class="material-icons" aria-hidden="true">home</span>
    
    </header>

    <main>
        <h2>Sign Up Form</h2>
        <form action="thankyou.html" method="GET">

            <fieldset>
                <legend>Section 1: Basic Info</legend>
                
                <div class="form-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" maxlength="30" required>
                </div>

                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" maxlength="40" required>
                </div>

                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" minlength="8" maxlength="16" required>
                </div>
                <div class="form-group">
                    <label for="age">Age:</label>
                    <select id="age" name="age" required>
                        <option value="under-13">Under 13</option>
                        <option value="13-18">13 to 18</option>
                        <option value="over-18">Over 18</option>
                    </select>
                </div>
            </fieldset>

            <fieldset style="margin-top: 20px;">
                <legend>Section 2: Your Profile</legend>

                <div class="form-group">
                    <label for="bio">Bio:</label>
                    <textarea id="bio" name="bio" rows="4" cols="40" maxlength="1500" placeholder="Tell me about yourself (Max 250 words)..." required></textarea>
                </div>

                <div class="form-group">
                    <label for="hobby">Hobby:</label>
                    <select id="hobby" name="hobby" required>
                        <option value="reading">Reading</option>
                        <option value="coding">Coding</option>
                        <option value="painting">Painting</option>
                        <option value="cooking">Cooking</option>
                        <option value="exercise">Exercising</option>
                        <option value="Crocheting">Crocheting</option>
                        <option value="hiking">Hiking</option>
                        <option value="photography">Photography</option>
                        <option value="videography">Videography</option>
                        <option value="music">Music</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Interests (Select one or more):</label>
                    <div style="display: flex; flex-direction: column; gap: 5px; margin-top: 5px;">
                        <label><input type="checkbox" name="interests" value="art"> Art</label>
                        <label><input type="checkbox" name="interests" value="science"> Science</label>
                        <label><input type="checkbox" name="interests" value="music"> Music</label>
                        <label><input type="checkbox" name="interests" value="sports"> Sports</label>
                        <label><input type="checkbox" name="interests" value="market"> Marketing</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="travel">Willing to travel:</label>
                    <select id="travel" name="travel" required>
                        <option value="yes">Yes</option>
                        <option value="no">No</option>
                    </select>
                </div>

            </fieldset>


            <fieldset style="margin-top: 20px;">
                <legend>Section 3: Actions</legend>
                <div class="button-group" style="display: flex; gap: 10px; margin-top: 10px;">
                    <button type="submit">Submit</button>
                    <button type="reset">Clear</button>
                </div>
            </fieldset>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 Tahrima Sultana. All rights reserved.</p>
    </footer>
</body>
</html>
